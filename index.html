<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Rustle - Wordle clone in pure Rust" />
    <title>Rustle</title>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rustle (Title)" />
    <meta property="og:description" content="Rustle (Description)" />
    <meta property="og:image" content="/public/favicon.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary" />
    <meta property="twitter:title" content="Rustle (Title)" />
    <meta property="twitter:description" content="Rustle (Description)" />
    <meta property="twitter:image" content="/public/favicon.png" />
    
    <!-- Link to pre-compiled Tailwind stylesheet -->
    <link data-trunk rel="css" href="src/tailwind.css" />
    <link data-trunk rel="rust" data-bin="rustle" data-wasm-opt="0" />
    
    <!-- Copy public folder assets -->
    <link data-trunk rel="copy-dir" href="public" />
    
    <link rel="icon" href="public/favicon.png" type="image/png" />
    <link rel="manifest" href="public/manifest.json" />
  </head>
  <body class="bg-white dark:bg-slate-900 transition-colors duration-300">
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then(reg => console.log('ServiceWorker registered', reg))
            .catch(err => console.error('ServiceWorker registration failed', err));
        });
      }
    </script>
  </body>
</html>
